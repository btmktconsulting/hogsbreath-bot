name: Check Hog's Breath Events

on:
  schedule:
    # Run every 15 min during show windows to handle GitHub Actions cron delays
    # Show times: 12 PM, 4:30 PM, 9 PM ET
    # Cover both EDT (UTC-4) and EST (UTC-5) offsets
    - cron: '45,0,15,30 15,16 * * *'    # ~11:45 AM - 12:30 PM ET
    - cron: '15,30,45,0 20,21 * * *'     # ~4:15 PM - 5:00 PM ET
    - cron: '45,0,15,30 0,1 * * *'       # ~8:45 PM - 9:30 PM ET
  workflow_dispatch: # Allow manual trigger
    inputs:
      test:
        description: 'Send test notification for first event'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: notified_state.json
          key: notified-${{ github.run_id }}
          restore-keys: notified-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for upcoming performances
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py ${{ github.event.inputs.test == 'true' && '--test' || '' }}
